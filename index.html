    <!-- ============================================= -->
    <!-- SERVICE WORKER REGISTRATION                    -->
    <!-- ============================================= -->
    <script>
      // Service Worker Registration (with fallback paths)
      if ('serviceWorker' in navigator) {
        const swPaths = [
          './service-worker.js',
          './public/service-worker.js',
          '/service-worker.js',
          '/public/service-worker.js',
        ];

        let registered = false;

        for (const swPath of swPaths) {
          if (!registered) {
            navigator.serviceWorker
              .register(swPath)
              .then((registration) => {
                console.log(
                  'Service Worker registered with scope:',
                  registration.scope,
                  'Path:',
                  swPath
                );
                registered = true;
              })
              .catch((error) => {
                console.log(
                  'Service Worker registration failed for',
                  swPath,
                  ':',
                  error
                );
              });
          }
        }
      }

      // Theme color adaptation based on color scheme preference
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute('content', '#007E37');
      } else {
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute('content', '#00AE58');
      }
    </script>
